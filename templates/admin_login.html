<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .admin-login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            max-width: 400px;
            margin: 0 auto;
        }
        .admin-icon {
            font-size: 50px;
            color: #764ba2;
            margin-bottom: 20px;
        }
        .admin-title {
            color: #333;
            font-weight: bold;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="admin-login-card text-center">
                    <div class="admin-icon">🔐</div>
                    <h2 class="admin-title">Administrator Login</h2>
                    
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    
                    <form method="POST" action="/admin/login">
                        <div class="mb-3">
                            <input type="text" class="form-control form-control-lg" 
                                   name="username" placeholder="Admin Username" required>
                        </div>
                        
                        <div class="mb-3">
                            <input type="password" class="form-control form-control-lg" 
                                   name="password" placeholder="Admin Password" required>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark btn-lg">Login as Admin</button>
                        </div>
                    </form>
                    
                    <div class="mt-4">
                        <a href="/" class="btn btn-outline-secondary w-100">
                            ← Back to Student Portal
                        </a>
                    </div>
                    
                   
                </div>
            </div>
        </div>
    </div>
</body>
</html>
